<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance 360 — Guía Visual Demo (Mock UI)</title>
<style>
:root{
  color-scheme:light;
  --bg:#eef3f9;--surface:#fff;--surface-muted:#eef3f8;--text:#172033;--muted:#64748b;
  --border:#d9e2ec;--accent:#1769aa;--accent-strong:#0f4c81;--success:#0f766e;--warning:#b45309;
  --danger:#b91c1c;--focus:#2563eb;--shadow:0 18px 45px rgba(15,23,42,.08);
  --gradient:linear-gradient(135deg,#0f4c81 0%,#1769aa 48%,#0f766e 100%);
  --radius:14px;--coach-w:400px;--guide-accent:#d4af37;
  font-family:"Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at top left,rgba(23,105,170,.12),transparent 28rem),radial-gradient(circle at bottom right,rgba(15,118,110,.1),transparent 24rem),var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.guide-shell{display:grid;grid-template-rows:auto 1fr;height:100vh}
.guide-header{display:flex;align-items:center;gap:.65rem;padding:.55rem 1rem;background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);z-index:20;flex-wrap:wrap}
.guide-brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:.88rem;color:var(--accent-strong)}
.guide-brand-mark{width:34px;height:34px;border-radius:10px;background:var(--gradient);color:#fff;display:grid;place-items:center;font-size:.68rem}
.guide-meta{display:flex;flex-wrap:wrap;gap:.35rem;flex:1;align-items:center}
.chip{display:inline-flex;align-items:center;gap:.25rem;padding:.28rem .6rem;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:.72rem;font-weight:600}
.chip.role{color:#fff;border:none}
.chip.gold{background:linear-gradient(135deg,#d4af37,#c9a020);color:#061e47;border:none}
.chip.demo{background:#ecfdf5;border-color:#86efac;color:var(--success)}
.guide-nav{display:flex;gap:.35rem;margin-left:auto}
.gbtn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:.42rem .85rem;font-size:.78rem;font-weight:650;cursor:pointer}
.gbtn.primary{background:var(--gradient);border-color:var(--accent);color:#fff}
.gbtn:hover{transform:translateY(-1px)}
.guide-body{display:grid;grid-template-columns:1fr var(--coach-w);min-height:0}
.mock-frame{position:relative;overflow:auto;background:var(--bg);border-right:1px solid var(--border)}
.mock-scale{transform-origin:top left;min-height:100%}
.demo-watermark{position:absolute;top:.65rem;left:50%;transform:translateX(-50%);z-index:9;pointer-events:none;
  background:rgba(212,175,55,.92);color:#061e47;padding:.22rem .65rem;border-radius:999px;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.role-switch-overlay{position:absolute;inset:0;z-index:8;background:rgba(15,76,129,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:1rem}
.role-switch-card{background:#fff;border-radius:var(--radius);padding:1.25rem;max-width:420px;width:100%;box-shadow:var(--shadow);border:2px solid #fdba74;text-align:center}
.role-switch-card h3{color:#c2410c;font-size:.85rem;margin-bottom:.65rem;text-transform:uppercase;letter-spacing:.06em}
.hotspot{position:relative;display:inline-block}
.hotspot::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#061e47;color:#fff;padding:.25rem .45rem;border-radius:6px;font-size:.62rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:99}
.hotspot:hover::after,.hotspot.pulse::after{opacity:1}
.hotspot-ring{outline:3px solid var(--guide-accent);outline-offset:3px;border-radius:8px;animation:ringPulse 1.6s ease infinite}
@keyframes ringPulse{0%,100%{outline-color:var(--guide-accent)}50%{outline-color:transparent}}
.coach{background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);display:flex;flex-direction:column;min-height:0;box-shadow:-8px 0 32px rgba(15,23,42,.06)}
.coach-head{padding:1rem 1rem .75rem;border-bottom:1px solid var(--border)}
.coach-head h2{font-size:1rem;color:var(--accent-strong);line-height:1.35;margin:.35rem 0}
.coach-phase{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.coach-scroll{flex:1;overflow-y:auto;padding:1rem;display:grid;gap:.85rem}
.script-card{background:linear-gradient(135deg,#f8faff,#eef3ff);border:1px solid #c7d7f5;border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:1rem;line-height:1.7;font-size:.92rem}
.action-step{display:flex;gap:.55rem;padding:.55rem .65rem;border-radius:10px;border:1px solid var(--border);font-size:.82rem;background:var(--surface)}
.action-step.active{background:#eff6ff;border-color:#93c5fd;box-shadow:inset 3px 0 0 var(--accent)}
.action-step.done{opacity:.55}
.action-num{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:800;display:grid;place-items:center;flex-shrink:0}
.cred-card{background:var(--surface-muted);border:1px solid var(--border);border-radius:12px;padding:.75rem;font-size:.78rem}
.cred-card code{word-break:break-all;font-size:.74rem}
.flow-mini{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:.25rem;font-size:.68rem;margin-top:.35rem}
.flow-mini div{background:var(--surface-muted);border:1px solid var(--border);border-radius:8px;padding:.4rem;text-align:center}
.flow-mini .mid{border-color:var(--guide-accent);background:#fffef8;font-weight:700}
.coach-foot{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.45rem}
.block-rail{display:flex;gap:.2rem;padding:.45rem 1rem .35rem;overflow-x:auto;border-bottom:1px solid var(--border);background:rgba(255,255,255,.92);position:relative;z-index:15}
.block-dot{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-size:.62rem;font-weight:800;cursor:pointer;flex-shrink:0;display:grid;place-items:center}
.block-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.block-dot.done{background:var(--success);border-color:var(--success);color:#fff}

/* ——— App UI replica (from styles.css) ——— */
.login-page{min-height:calc(100vh - 90px);display:grid;grid-template-columns:minmax(280px,380px) 1fr}
.login-panel{background:rgba(255,255,255,.92);padding:36px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border);box-shadow:var(--shadow)}
.login-hero{padding:40px;display:flex;flex-direction:column;justify-content:center;gap:20px;background:linear-gradient(135deg,rgba(15,76,129,.92),rgba(15,118,110,.78))}
.brand-line{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.brand-mark{width:44px;height:44px;border-radius:12px;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.82rem}
.product-badge{display:inline-flex;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:12px;color:var(--muted);background:var(--surface)}
.login-panel h1{font-size:24px;margin:0 0 8px}
.login-panel p,.hero-card p{color:var(--muted);line-height:1.5;font-size:14px}
.form-stack{display:grid;gap:14px;margin-top:16px}
.field{display:grid;gap:6px}
.field label{font-weight:650;font-size:13px}
.field input,.search-box{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:10px 12px;width:100%;font-size:14px}
.btn{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:9px 13px;cursor:pointer;font-weight:600;font-size:13px}
.btn.primary{background:var(--gradient);border-color:var(--accent);color:#fff}
.hero-card h2{color:#fff;font-size:1.6rem;margin:.5rem 0}
.hero-card .product-badge{border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.12)}
.status-pill{display:inline-flex;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:12px;background:var(--surface)}
.status-pill.ok{color:var(--success);border-color:#99f6e4;background:#ecfdf5}
.grid.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.glass-card{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px;color:#fff}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.85}
.metric-value{font-size:1.5rem;font-weight:800;margin-top:4px}
.layout{min-height:calc(100vh - 90px);display:grid;grid-template-columns:250px 1fr}
.sidebar{background:rgba(255,255,255,.92);border-right:1px solid var(--border);padding:14px;height:100%;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--border)}
.brand-title{font-weight:800;font-size:14px}
.brand-subtitle{color:var(--muted);font-size:11px}
.sidebar-status{display:grid;gap:6px;margin:12px 0;padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--surface)}
.sidebar-status small{color:var(--muted);font-size:11px}
.nav-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:8px 6px 4px}
.nav-button{width:100%;border:0;background:transparent;text-align:left;padding:8px 10px;border-radius:10px;display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;font-size:13px;cursor:default;color:var(--text)}
.nav-button.active{background:var(--surface-muted);box-shadow:inset 4px 0 0 var(--accent);font-weight:700;color:var(--accent-strong)}
.nav-icon{width:26px;height:26px;border-radius:9px;background:rgba(23,105,170,.1);color:var(--accent-strong);display:grid;place-items:center;font-size:10px;font-weight:800}
.sidebar-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;display:grid;grid-template-columns:1fr 1.2fr auto;gap:12px;align-items:center;padding:0 18px;background:rgba(255,255,255,.84);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.breadcrumbs.compact{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tenant-chip,.status-chip{font-size:12px;border:1px solid var(--border);border-radius:999px;padding:5px 9px;color:var(--muted);background:var(--surface)}
.btn.danger{border-color:var(--danger);color:var(--danger);background:var(--surface)}
.content{padding:18px;display:grid;gap:16px}
.page-title h1{font-size:1.35rem;margin:0}
.page-title p{color:var(--muted);font-size:13px;margin-top:4px}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.card,.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.section-title{font-size:1rem;margin:0 0 8px}
.grid.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px}
.metric-card span{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.metric-card strong{font-size:1.1rem}
.tenant-hero,.platform-hero,.module-hero{display:flex;justify-content:space-between;gap:16px;padding:18px;border-radius:var(--radius);background:linear-gradient(135deg,rgba(23,105,170,.08),rgba(15,118,110,.06));border:1px solid var(--border)}
.tenant-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tenant-tab{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:7px 12px;font-size:12px;cursor:default}
.tenant-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--surface-muted);text-align:left;padding:8px;border:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--muted)}
.data-table td{padding:8px;border:1px solid var(--border)}
.tag-status{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.tag-status.active{background:#ecfdf5;color:var(--success)}
.tag-status.draft{background:#fef3c7;color:var(--warning)}
.read-only-notice{background:#fff7ed;border:1px dashed #fdba74;border-radius:12px;padding:14px;color:#9a3412;font-size:13px}
.progress{width:100%;height:10px;border-radius:999px;overflow:hidden;margin:8px 0}
.heat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.heat-cell{aspect-ratio:1;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff}
.intro-screen,.close-screen{min-height:calc(100vh - 130px);display:grid;place-items:center;padding:2rem}
.intro-card,.close-card{max-width:720px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow)}
.intro-card h1{font-size:1.8rem;color:var(--accent-strong);margin-bottom:.75rem}
.pain-list{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin:1rem 0;font-size:.85rem}
.pain-list li{list-style:none;padding:.45rem .65rem;background:var(--surface-muted);border-radius:8px;border-left:3px solid var(--accent)}
@media(max-width:1100px){.guide-body{grid-template-columns:1fr}.coach{position:fixed;right:0;top:auto;bottom:0;left:0;height:42vh;z-index:30;border-top:1px solid var(--border)}.mock-frame{padding-bottom:42vh}}

/* Journey & onboarding */
.welcome-overlay,.journey-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(6,30,71,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
.welcome-overlay.open,.journey-overlay.open{display:flex}
.welcome-card,.journey-card{background:var(--surface);border-radius:var(--radius);max-width:720px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.welcome-head,.journey-head{padding:1.25rem 1.35rem;border-bottom:1px solid var(--border)}
.welcome-head h2,.journey-head h2{color:var(--accent-strong);font-size:1.2rem;margin-bottom:.35rem}
.welcome-body,.journey-body{padding:1.1rem 1.35rem;overflow-y:auto;flex:1}
.setup-steps{display:grid;gap:.55rem;margin:1rem 0}
.setup-step{display:flex;gap:.65rem;padding:.65rem .75rem;border:1px solid var(--border);border-radius:10px;background:var(--surface-muted)}
.setup-num{width:26px;height:26px;border-radius:8px;background:var(--gradient);color:#fff;font-weight:800;font-size:.72rem;display:grid;place-items:center;flex-shrink:0}
.artifact-chain{display:flex;flex-wrap:wrap;gap:.3rem;margin:1rem 0}
.artifact-chip-sm{font-size:.62rem;padding:.2rem .45rem;border-radius:6px;border:1px solid var(--border);background:var(--surface)}
.artifact-chip-sm.arrow{background:transparent;border:none;color:var(--guide-accent);font-weight:700}
.phase-timeline{list-style:none;display:grid;gap:.55rem}
.phase-timeline li{border:1px solid var(--border);border-radius:12px;padding:.75rem .85rem;cursor:pointer;transition:all .2s;background:var(--surface)}
.phase-timeline li:hover{border-color:var(--accent);transform:translateX(4px)}
.phase-timeline li.active{border-color:var(--guide-accent);background:#fffef8;box-shadow:0 4px 16px rgba(212,175,55,.15)}
.phase-timeline .ph-meta{font-size:.68rem;color:var(--muted);margin-top:.25rem}
.tour-bar{display:none;background:linear-gradient(90deg,var(--accent-strong),var(--accent));color:#fff;padding:.45rem 1rem;font-size:.78rem;align-items:center;gap:.65rem;flex-wrap:wrap}
.tour-bar.open{display:flex}
.tour-bar button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:.3rem .65rem;cursor:pointer;font-size:.72rem;font-weight:600}
.journey-progress{height:4px;background:rgba(255,255,255,.2);border-radius:99px;flex:1;min-width:80px}
.journey-progress-fill{height:100%;background:var(--guide-accent);border-radius:99px;transition:width .35s}
.coach-position{font-size:.68rem;color:var(--muted);margin-top:.35rem;padding:.35rem .5rem;background:var(--surface-muted);border-radius:8px}

/* ═══ PREMIUM 1000% UX ═══ */
:root{--coach-w:420px}
[data-theme="dark"]{--bg:#0a1220;--surface:#111b2e;--surface-muted:#0f1729;--text:#e8edf5;--muted:#94a3b8;--border:#1e2d45}
[data-theme="dark"] body{background:#0a1220}
.progress-ring-wrap{display:flex;align-items:center;gap:.35rem}
.journey-svg-wrap{margin:0 1rem .35rem;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85)}
.journey-svg-wrap .journey-node:hover rect{filter:brightness(1.08)}
.spotlight-bar{display:flex;align-items:center;gap:.55rem;padding:.55rem .85rem;background:linear-gradient(90deg,#061e47,#0f4c81);color:#fff;font-size:.8rem;border-bottom:2px solid var(--guide-accent)}
.spotlight-pulse{width:10px;height:10px;border-radius:50%;background:var(--guide-accent);animation:spotPulse 1.2s ease infinite;flex-shrink:0}
@keyframes spotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}}
.spotlight-btn{margin-left:auto;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:8px;padding:.35rem .7rem;cursor:pointer;font-size:.72rem;font-weight:700}
.spotlight-btn:hover{background:rgba(255,255,255,.25)}
.coach-tabs{display:flex;gap:.15rem;padding:.45rem 1rem 0;border-bottom:1px solid var(--border);overflow-x:auto}
.coach-tab{padding:.4rem .7rem;border:none;background:none;cursor:pointer;font-size:.7rem;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.coach-tab.active{color:var(--accent-strong);border-bottom-color:var(--guide-accent)}
.coach-panel{display:none}.coach-panel.active{display:block}
.cred-card.premium{border:2px solid var(--accent);background:linear-gradient(135deg,#f8faff,#fff)}
.cred-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.cred-copy-btn{font-size:.65rem;padding:.25rem .5rem;border-radius:6px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-weight:700}
.cred-grid{display:grid;gap:.35rem;font-size:.74rem}
.cred-grid span{font-size:.58rem;text-transform:uppercase;color:var(--muted);font-weight:700}
.verify-card{background:#ecfdf5;border:1px solid #86efac;border-radius:10px;padding:.75rem;font-size:.82rem}
.block-rail .block-dot.role-dot{font-size:0;width:8px;min-width:8px;padding:0;border-radius:50%;height:8px;align-self:center}
.mock-frame.block-enter{animation:blockEnter .45s cubic-bezier(.2,.8,.2,1)}
@keyframes blockEnter{from{opacity:0;transform:translateY(12px) scale(.99)}to{opacity:1;transform:none}}
.celebrate-flash{animation:celebrateFlash .7s ease}
@keyframes celebrateFlash{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 4px var(--guide-accent),0 0 40px rgba(212,175,55,.35)}}
.toast-premium{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(12px);background:#061e47;color:#fff;padding:.55rem 1.1rem;border-radius:999px;font-size:.8rem;z-index:600;opacity:0;transition:all .3s;pointer-events:none;border:1px solid var(--guide-accent)}
.toast-premium.show{opacity:1;transform:translateX(-50%) translateY(0)}
body.present-mode .coach{width:340px}
body.present-mode .script-card{font-size:1.02rem;line-height:1.8}
body.present-mode .guide-header{background:linear-gradient(90deg,#061e47,#0f4c81);color:#fff}
body.present-mode .guide-header .chip:not(.role){background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff}
body.immersive .guide-header,.body.immersive .block-rail,.body.immersive .journey-svg-wrap{opacity:0;pointer-events:none;position:absolute}
body.immersive .tour-bar{top:0}
.director-on .action-step.active{animation:directorGlow 1.5s ease infinite}
@keyframes directorGlow{0%,100%{box-shadow:inset 3px 0 0 var(--accent)}50%{box-shadow:inset 3px 0 0 var(--guide-accent),0 0 12px rgba(212,175,55,.3)}}
.gbtn.active-toggle{background:var(--guide-accent);color:#061e47;border-color:var(--guide-accent);font-weight:800}
</style>
</head>
<body>
<div class="guide-shell">
  <header class="guide-header">
    <div class="guide-brand"><div class="guide-brand-mark">C360</div>Guía Visual Demo · Mock UI</div>
    <div class="guide-meta">
      <span class="progress-ring-wrap" id="progressRing"></span>
      <span class="chip demo">Mock UI · offline OK</span>
      <span class="chip" id="chipBlock">Bloque 1/20</span>
      <span class="chip role" id="chipRole">Presentador</span>
      <span class="chip gold" id="chipTime">⏱ 00:00</span>
      <span class="chip" id="chipPhase">Fase —</span>
    </div>
    <div class="guide-nav">
      <button class="gbtn" id="btnPresent" title="Modo presentador">🎯 Presentar</button>
      <button class="gbtn" id="btnDirector" title="Auto-avance acciones">⚡ Director</button>

<script>/* Shared premium UX — embedded in both demo guides */
window.C360Guide = {
  esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; },

  phaseForBlock(data, id) {
    return (data.journey?.phases || []).find(p => p.blocks.includes(id));
  },

  progressRing(pct, size = 36) {
    const r = (size - 6) / 2;
    const c = 2 * Math.PI * r;
    const off = c - (pct / 100) * c;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="progress-ring" aria-hidden="true">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(0,0,0,.08)" stroke-width="4"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#rg)" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
      <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f4c81"/><stop offset="100%" stop-color="#d4af37"/></linearGradient></defs>
      <text x="50%" y="54%" text-anchor="middle" font-size="9" font-weight="800" fill="#0f4c81">${pct}%</text></svg>`;
  },

  journeySvg(data, activeBlockId) {
    const phases = data.journey?.phases || [];
    if (!phases.length) return "";
    const w = Math.min(phases.length * 88, 880);
    return `<div class="journey-svg-wrap" style="overflow-x:auto;padding:.5rem 0"><svg viewBox="0 0 ${phases.length * 88} 72" width="${w}" height="72" class="journey-svg">
      ${phases.map((p, i) => {
        const active = p.blocks.includes(activeBlockId);
        const done = p.blocks.every(bid => window.C360Guide._doneSet?.has(bid));
        const x = i * 88 + 8;
        const fill = active ? "#1769aa" : done ? "#0f766e" : "#e2e8f0";
        const text = active ? "#fff" : done ? "#fff" : "#64748b";
        return `<g class="journey-node" data-phase-idx="${p.blocks[0]-1}" style="cursor:pointer">
          <rect x="${x}" y="8" width="72" height="44" rx="10" fill="${fill}" stroke="${active?"#d4af37":"transparent"}" stroke-width="2"/>
          <text x="${x+36}" y="26" text-anchor="middle" font-size="8" font-weight="700" fill="${text}">F${p.order}</text>
          <text x="${x+36}" y="40" text-anchor="middle" font-size="6.5" fill="${text}">${p.label.split(" ")[0]}</text>
          ${i < phases.length - 1 ? `<line x1="${x+72}" y1="30" x2="${x+88}" y2="30" stroke="#d4af37" stroke-width="2" marker-end="url(#arr)"/>` : ""}
        </g>`;
      }).join("")}
      <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d4af37"/></marker></defs>
    </svg></div>`;
  },

  bindJourneySvg(root, onGo) {
    root.querySelectorAll(".journey-node").forEach(g => g.addEventListener("click", () => onGo(+g.dataset.phaseIdx)));
  },

  spotlightHtml(text) {
    return `<div class="spotlight-bar" id="spotlightBar"><span class="spotlight-pulse"></span><span id="spotlightText">${this.esc(text)}</span><button class="spotlight-btn" id="btnSpotlightNext">Siguiente paso →</button></div>`;
  },

  toast(el, msg) {
    if (!el) return;
    el.textContent = msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 2400);
  },

  celebrate(el) {
    if (!el) return;
    el.classList.add("celebrate-flash");
    setTimeout(() => el.classList.remove("celebrate-flash"), 700);
  },

  copyText(text, toastEl) {
    if (navigator.clipboard) navigator.clipboard.writeText(text).then(() => this.toast(toastEl, "Copiado al portapapeles"));
  },

  credCard(role, cred, copyFn) {
    if (!cred) return "";
    return `<div class="cred-card premium"><div class="cred-head"><strong>🔑 ${this.esc(role)}</strong><button type="button" class="cred-copy-btn" data-copy-role="${this.esc(role)}">Copiar todo</button></div>
      <div class="cred-grid"><div><span>Tenant</span><code>${this.esc(cred.tenantId)}</code></div>
      <div><span>Email</span><code>${this.esc(cred.email)}</code></div>
      <div><span>Password</span><code>${this.esc(cred.password)}</code></div></div></div>`;
  }
};
</script>

function phaseForBlock(id) { return G.phaseForBlock(DATA, id); }

function renderWelcome() {
  const j = DATA.journey;
  if (!j) return;
  document.getElementById("welcomeTitle").textContent = j.title;
  document.getElementById("welcomeSub").textContent = j.subtitle;
  document.getElementById("welcomeBody").innerHTML = `
    <p style="margin-bottom:.75rem;font-size:.88rem"><strong>No necesita la app</strong> para usar esta guía. Funciona offline. La app real solo hace falta en demo en vivo.</p>
    <div class="setup-steps">${j.setup.map(s=>`<div class="setup-step"><span class="setup-num">${s.step}</span><div><strong>${esc(s.title)}</strong><br><span style="font-size:.8rem;color:var(--muted)">${esc(s.detail)}</span></div></div>`).join("")}</div>
    <p style="font-size:.72rem;text-transform:uppercase;color:var(--muted);font-weight:700;margin:1rem 0 .45rem">Cadena de artefactos E2E</p>
    <div class="artifact-chain">${j.artifactChain.map((a,i)=>`<span class="artifact-chip-sm">${esc(a)}</span>${i<j.artifactChain.length-1?'<span class="artifact-chip-sm arrow">→</span>':""}`).join("")}</div>
    ${G.journeySvg(DATA, 1)}
    <ul class="phase-timeline" style="margin-top:1rem">${j.phases.map(p=>`<li data-block="${p.blocks[0]-1}"><strong>Fase ${p.order}: ${esc(p.label)}</strong> · Bloques ${p.blocks.join('–')}<div class="ph-meta">🎯 ${esc(p.goal)}</div></li>`).join("")}</ul>`;
  G.bindJourneySvg(document.getElementById("welcomeBody"), i => { closeWelcome(); go(i); });
  document.querySelectorAll("#welcomeBody .phase-timeline li").forEach(li => li.addEventListener("click", () => {
    closeWelcome(); go(+li.dataset.block);
  }));
}

function renderJourneyModal() {
  const j = DATA.journey;
  if (!j) return;
  document.getElementById("journeyBody").innerHTML = `
    <div class="artifact-chain" style="margin-bottom:1rem">${j.artifactChain.map((a,i)=>`<span class="artifact-chip-sm">${esc(a)}</span>${i<j.artifactChain.length-1?'<span class="artifact-chip-sm arrow">→</span>':""}`).join("")}</div>
    ${G.journeySvg(DATA, DATA.blocks[idx]?.id)}
    <ul class="phase-timeline">${j.phases.map(p=>{
      const active = p.blocks.includes(DATA.blocks[idx]?.id);
      return `<li class="${active?"active":""}" data-block="${p.blocks[0]-1}"><strong>Fase ${p.order}: ${esc(p.label)}</strong> · ${esc(p.duration)} · ${esc(p.role)}
        <div class="ph-meta">📖 ${esc(p.story)}</div><div class="ph-meta">✅ ${esc(p.output)}</div></li>`;
    }).join("")}</ul>`;
  document.querySelectorAll("#journeyBody .phase-timeline li").forEach(li => li.addEventListener("click", () => {
    document.getElementById("journeyModal").classList.remove("open");
    go(+li.dataset.block);
  }));
  G.bindJourneySvg(document.getElementById("journeyBody"), i => { document.getElementById("journeyModal").classList.remove("open"); go(i); });
}

function closeWelcome() {
  document.getElementById("welcomeModal").classList.remove("open");
  localStorage.setItem(WELCOME_KEY, "1");
}
function startTour() {
  closeWelcome();
  tourMode = true;
  document.getElementById("tourBar").classList.add("open");
  go(0);
  updateTourBar();
}
function stopTour() {
  tourMode = false;
  document.getElementById("tourBar").classList.remove("open");
}
function updateTourBar() {
  const pct = Math.round(((idx + 1) / DATA.blocks.length) * 100);
  document.getElementById("tourProgress").style.width = pct + "%";
  const ph = phaseForBlock(DATA.blocks[idx]?.id);
  document.getElementById("tourLabel").textContent = `Recorrido · Bloque ${DATA.blocks[idx]?.id}/20` + (ph ? ` · Fase ${ph.order}: ${ph.label}` : "");
}

function updateProgressRing() {
  const pct = Math.round((done.size / DATA.blocks.length) * 100);
  document.getElementById("progressRing").innerHTML = G.progressRing(pct || Math.round(((idx+1)/DATA.blocks.length)*100));
}

function renderJourneySvg() {
  const wrap = document.getElementById("journeySvgWrap");
  wrap.innerHTML = G.journeySvg(DATA, DATA.blocks[idx]?.id);
  G.bindJourneySvg(wrap, go);
}

function renderSpotlight(b) {
  const mount = document.getElementById("spotlightMount");
  const act = b.actions?.[actionIdx];
  if (!act) { mount.innerHTML = ""; return; }
  mount.innerHTML = G.spotlightHtml(act);
  document.getElementById("btnSpotlightNext")?.addEventListener("click", advanceAction);
}

function advanceAction() {
  const b = DATA.blocks[idx];
  const max = (b.actions?.length || 1) - 1;
  if (actionIdx < max) { actionIdx++; renderCoach(b); renderSpotlight(b); }
  else { G.toast(toastEl(), "Acciones completadas — marque bloque listo o Siguiente →"); }
}

function bindCoachTabs() {
  document.querySelectorAll(".coach-tab").forEach(t => t.addEventListener("click", () => {
    coachTab = t.dataset.ctab;
    document.querySelectorAll(".coach-tab").forEach(x => x.classList.toggle("active", x.dataset.ctab === coachTab));
    document.querySelectorAll(".coach-panel").forEach(p => p.classList.toggle("active", p.dataset.ctabPanel === coachTab));
  }));
}

function routeKey(r){return (!r||r==="—")?null:r.replace("#/","").replace("#","")}
function cred(role){return role?DATA.credentials[role]:null}
function hs(html,tip,pulse){return `<span class="hotspot ${pulse?"pulse hotspot-ring":""}" data-tip="${esc(tip)}">${html}</span>`}

function renderNav(active){
  return NAV.map(g=>`<nav class="nav-group"><div class="nav-label">${esc(g.group)}</div>
    ${g.items.map(([k,l])=>`<div class="nav-button ${k===active?"active":""}"><span class="nav-icon">${l.split(' ').map(w=>w[0]).join('').slice(0,2)}</span><span>${esc(l)}</span><span>›</span></div>`).join("")}</nav>`).join("")
}

function shellTop(routeKey, label, group, tenantShort, userEmail){
  return `<header class="topbar">
    <div><div class="breadcrumbs compact">Compliance 360 / ${esc(group)}</div><strong>${esc(label)}</strong></div>
    <input class="search-box" placeholder="Buscar módulo o documento..." readonly>
    <div class="top-actions">
      <span class="status-pill ok">Production core</span>
      <span class="tenant-chip">Tenant: ${esc(tenantShort)}</span>
      ${hs(`<button class="btn danger">Salir</button>`,"Logout — cambio de rol",true)}
    </div></header>`;
}

function tableHtml(title, cols, rows){
  return `<section class="card"><h2 class="section-title">${esc(title)}</h2>
    <table class="data-table"><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join("")}</tr>`).join("")}</tbody></table></section>`;
}

function moduleScreen(b, key, title, desc, showForm, formFields, rows){
  const c = cred(b.loginRole);
  const tenantShort = (c?.tenantId||DATA.tenantId).slice(0,8)+"…";
  const form = showForm ? `<section class="card hotspot-ring" id="module-action-form">
    <h2 class="section-title">Action Center</h2>
    <div class="form-stack">${formFields.map(f=>`<div class="field"><label>${esc(f.label)}</label><input value="${esc(f.value)}" readonly></div>`).join("")}
    ${hs(`<button class="btn primary">Guardar / Crear</button>`,"Submit — toast de éxito",true)}</div></section>`
    : `<section class="card"><div class="read-only-notice"><strong>SoD — solo lectura</strong> Este rol no ve el formulario de creación (#module-action-form ausente).</div></section>`;
  return `<div class="layout">${renderSidebar(key)}
    <main class="main">${shellTop(key,title,"Operations",tenantShort,c?.email)}
    <section class="content">
      <div class="page-title"><h1>${esc(title)}</h1><p>${esc(desc)}</p></div>
      <section class="grid cards">${[["Records",rows.length],["Page","1"],["Page Size","10"],["Status","Live"]].map(m=>`<article class="metric-card"><span>${m[0]}</span><strong>${m[1]}</strong></article>`).join("")}</section>
      ${form}
      ${tableHtml(title,["Title","Code","Status","Meta"],rows)}
    </section></main></div>`;
}

  return `<aside class="sidebar"><div class="brand"><div class="brand-mark">C360</div><div><div class="brand-title">Compliance 360</div><div class="brand-subtitle">Enterprise Edition</div></div></div>
    <section class="sidebar-status"><span class="status-pill ok">Live</span><strong>Alimentos Premium Panamá</strong><small>Tenant demo · ISO 9001 / HACCP</small></section>
    ${renderNav(active)}<footer class="sidebar-footer"><span>ISO aligned</span><strong>9001 / 22000 / HACCP</strong></footer></aside>`;
}

function screenReports(b){
  return moduleScreen(b,"reports","Report Center","Seed, ejecutar y exportar reportes ejecutivos.",true,
    [{label:"Report Code",value:"EXEC-COMPLIANCE"},{label:"Format",value:"PDF"}],
    DEMO_ROWS.reports);
}

function mockForBlock(b){
  const id = b.id, rk = routeKey(b.route);
  if(id===1) return screenIntro(b);
  if(id>=18) return screenClose(b);
  if(b.roleChanged && b.loginRole) return screenLogin(b);
  if(rk==="superadmin-platform") return screenPlatform(b, id===3?"tenants":"executive");
  if(rk==="tenant-administration") return screenTAC(b, id===5?"users":"general");
  if(rk==="configuration") return screenConfig(b, id===14?"storage-only":id===15?"email-only":"both");
  if(rk==="dashboard") return screenDashboard(b);
  if(rk==="reports") return screenReports(b);
  if(rk==="documents") return moduleScreen(b,"documents","Document Management","Control documental ISO con workflow.",id===6,
    [{label:"Code",value:"BPM-LIM-001"},{label:"Title",value:"Procedimiento Limpieza Áreas"}],DEMO_ROWS.documents);
  if(rk==="audits") return moduleScreen(b,"audits","Audit Management","Programas, checklists y hallazgos.",id===8,
    [{label:"Code",value:"AUD-INT-2026-01"},{label:"Title",value:"Auditoría Interna BPM"}],DEMO_ROWS.audits);
  if(rk==="capa") return moduleScreen(b,"capa","CAPA","Acciones correctivas y preventivas.",true,
    [{label:"Code",value:"CAPA-TEMP-001"},{label:"Title",value:"Desviación temperatura CCP"}],DEMO_ROWS.capa);
  if(rk==="risks") return moduleScreen(b,"risks","Risk Management","Matriz de riesgos operativos.",true,
    [{label:"Code",value:"RISK-CCP-01"},{label:"Title",value:"Fallo cadena de frío"}],DEMO_ROWS.risks);
  if(rk==="indicators") return moduleScreen(b,"indicators","Quality Indicators","KPIs de calidad con metas.",true,
    [{label:"Code",value:"KPI-NC-Rate"},{label:"Target",value:"95%"}],DEMO_ROWS.indicators);
  if(id===16) return moduleScreen(b,"documents","Document Management (Viewer)","Consulta sin edición.",false,[],DEMO_ROWS.documents);
  return screenIntro(b);
}

function renderCoach(b){
  const ph = phaseForBlock(b.id);
  document.getElementById("coachPhase").textContent = ph ? `Fase ${ph.order}/10 · ${ph.label}` : (b.module !== "—" ? b.module : b.screen);
  document.getElementById("coachTitle").innerHTML = `Bloque ${b.id}: ${esc(b.title)}` +
    (ph ? `<div class="coach-position">📍 ${esc(ph.story)}</div>` : "");
  document.getElementById("coachScript").textContent = b.script;
  document.getElementById("coachFlow").innerHTML = b.artifact && b.artifact !== "—"
    ? `<div>${esc(b.flowIn)}</div><div>→</div><div class="mid">${esc(b.artifact)}</div><div>→</div><div>${esc(b.flowOut)}</div>` : "";
  const c = cred(b.loginRole);
  document.getElementById("coachCreds").innerHTML = c ? G.credCard(b.loginRole, c) : "<p style='color:var(--muted);font-size:.82rem'>Sin login en este bloque.</p>";
  document.querySelectorAll(".cred-copy-btn").forEach(btn => btn.addEventListener("click", () => {
    const cr = cred(btn.dataset.copyRole);
    if (cr) G.copyText(`Tenant: ${cr.tenantId}\nEmail: ${cr.email}\nPassword: ${cr.password}`, toastEl());
  }));
  document.getElementById("coachActions").innerHTML = `<div class="${directorMode?"director-on":""}">` + b.actions.map((a,i)=>`<div class="action-step ${i===actionIdx?"active":i<actionIdx?"done":""}" data-ai="${i}">
    <span class="action-num">${i+1}</span><span>${esc(a)}</span></div>`).join("") + "</div>";
  document.getElementById("coachVerify").innerHTML = `<strong>✓ Criterio E2E</strong><br>${esc(b.verify)}`;
  document.getElementById("chipBlock").textContent = `Bloque ${b.id}/20`;
  document.getElementById("chipRole").textContent = b.loginRole || b.role;
  document.getElementById("chipRole").style.background = b.roleColor || "#64748b";
  document.getElementById("chipPhase").textContent = ph ? `Fase ${ph.order}` : "—";
  document.getElementById("roleOverlay").style.display = b.roleChanged ? "flex" : "none";
  document.getElementById("roleOverlay").innerHTML = b.roleChanged ? `<div class="role-switch-card"><h3>⚡ Cambio de rol</h3>
    <p style="font-size:.9rem;margin-bottom:.65rem">Logout → login como <strong>${esc(b.loginRole)}</strong></p>
    <button class="gbtn primary" onclick="document.getElementById('roleOverlay').style.display='none'">Entendido — continuar</button></div>` : "";
  renderSpotlight(b);
  updateProgressRing();
}

function renderRail(){
  document.getElementById("blockRail").innerHTML = DATA.blocks.map((b,i)=>{
    const ph = phaseForBlock(b.id);
    return `<button class="block-dot ${i===idx?"active":""} ${done.has(b.id)?"done":""}" data-i="${i}" title="${esc(b.title)}" style="${ph && i===idx?"box-shadow:0 0 0 2px var(--guide-accent)":""}">${b.id}</button>`;
  }).join("");
  document.querySelectorAll(".block-dot").forEach(d=>d.addEventListener("click",()=>go(+d.dataset.i)));
}

function render(){
  const b = DATA.blocks[idx];
  const frame = document.getElementById("mockFrame");
  frame.classList.remove("block-enter");
  void frame.offsetWidth;
  frame.classList.add("block-enter");
  document.getElementById("mockApp").innerHTML = mockForBlock(b);
  renderCoach(b);
  renderRail();
  renderJourneySvg();
  bindCoachTabs();
  document.querySelectorAll(".action-step").forEach(el=>el.addEventListener("click",()=>{actionIdx=+el.dataset.ai;renderCoach(b);}));
  if (directorMode) startDirector();
}

function go(i){
  if(i<0||i>=DATA.blocks.length) return;
  idx=i; actionIdx=0; render();
  if(tourMode) updateTourBar();
  document.querySelector(`.block-dot[data-i="${i}"]`)?.scrollIntoView({inline:"center",block:"nearest"});
}

function markDone(){
  const b = DATA.blocks[idx];
  const ph = phaseForBlock(b.id);
  done.add(b.id);
  G._doneSet = done;
  localStorage.setItem(STORAGE,JSON.stringify([...done]));
  renderRail();
  updateProgressRing();
  G.celebrate(document.getElementById("coach"));
  if (ph && ph.blocks.every(id => done.has(id))) G.toast(toastEl(), `🎉 Fase ${ph.order} completada: ${ph.label}`);
  if(tourMode && idx < DATA.blocks.length - 1) setTimeout(()=>go(idx+1), 500);
}

function startDirector() {
  clearInterval(directorTimer);
  directorTimer = setInterval(() => {
    const b = DATA.blocks[idx];
    if (actionIdx < (b.actions?.length || 1) - 1) { actionIdx++; renderCoach(b); }
  }, 3500);
}
function stopDirector() { clearInterval(directorTimer); directorTimer = null; }

function toggleDirector() {
  directorMode = !directorMode;
  document.getElementById("btnDirector").classList.toggle("active-toggle", directorMode);
  document.body.classList.toggle("director-on", directorMode);
  if (directorMode) startDirector(); else stopDirector();
  render();
}

function togglePresent() {
  presentMode = !presentMode;
  document.body.classList.toggle("present-mode", presentMode);
  document.getElementById("btnPresent").classList.toggle("active-toggle", presentMode);
  if (presentMode) { coachTab = "script"; document.querySelector('.coach-tab[data-ctab="script"]')?.click(); }
}

document.getElementById("btnPresent").addEventListener("click", togglePresent);
document.getElementById("btnDirector").addEventListener("click", toggleDirector);
document.getElementById("btnDark").addEventListener("click", () => {
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
  document.getElementById("btnDark").textContent = dark ? "🌙" : "☀️";
});
document.getElementById("btnImmersive").addEventListener("click", () => {
  document.body.classList.toggle("immersive");
  if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
});
document.getElementById("btnPrev").addEventListener("click",()=>go(idx-1));
document.getElementById("btnNext").addEventListener("click",()=>go(idx+1));
document.getElementById("btnMarkDone").addEventListener("click", markDone);
document.getElementById("btnJourney").addEventListener("click",()=>{ renderJourneyModal(); document.getElementById("journeyModal").classList.add("open"); });
document.getElementById("btnJourneyClose").addEventListener("click",()=>document.getElementById("journeyModal").classList.remove("open"));
document.getElementById("btnTour").addEventListener("click", startTour);
document.getElementById("btnStartTour").addEventListener("click", startTour);
document.getElementById("btnStartBlock1").addEventListener("click",()=>{ closeWelcome(); go(0); });
document.getElementById("btnWelcomeClose").addEventListener("click", closeWelcome);
document.getElementById("btnTourExit").addEventListener("click", stopTour);
document.getElementById("journeyModal").addEventListener("click",e=>{ if(e.target.id==="journeyModal") e.target.classList.remove("open"); });
document.getElementById("btnScriptOnly").addEventListener("click",()=>{
  document.querySelector(".coach-scroll").scrollTop = 0;
  document.getElementById("coachScript").style.fontSize = "1.05rem";
});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
  if(e.key==="ArrowRight") go(idx+1);
  if(e.key==="ArrowLeft") go(idx-1);
  if(e.key===" ") { e.preventDefault(); actionIdx=Math.min(actionIdx+1,(DATA.blocks[idx].actions?.length||1)-1); renderCoach(DATA.blocks[idx]); }
  if(e.key==="j"||e.key==="J"){ renderJourneyModal(); document.getElementById("journeyModal").classList.add("open"); }
  if(e.key==="g"||e.key==="G") startTour();
});
setInterval(()=>{
  const s=Math.floor((Date.now()-timer)/1000);
  document.getElementById("chipTime").textContent=`⏱ ${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
},1000);
renderWelcome();
if(localStorage.getItem(WELCOME_KEY)) document.getElementById("welcomeModal").classList.remove("open");
render();
</script>

</html>
