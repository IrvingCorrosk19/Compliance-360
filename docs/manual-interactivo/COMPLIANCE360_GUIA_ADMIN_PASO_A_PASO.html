<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance 360 — Guía Admin: Login, Tenant y Configuración</title>
<style>
:root{
  color-scheme:light;
  --bg:#eef3f9;--surface:#fff;--surface-muted:#eef3f8;--text:#172033;--muted:#64748b;
  --border:#d9e2ec;--accent:#1769aa;--accent-strong:#0f4c81;--success:#0f766e;--warning:#b45309;
  --danger:#b91c1c;--focus:#2563eb;--shadow:0 18px 45px rgba(15,23,42,.08);
  --gradient:linear-gradient(135deg,#0f4c81 0%,#1769aa 48%,#0f766e 100%);
  --radius:14px;--coach-w:420px;--guide-accent:#d4af37;
  font-family:"Segoe UI",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(circle at top left,rgba(23,105,170,.12),transparent 28rem),radial-gradient(circle at bottom right,rgba(15,118,110,.1),transparent 24rem),var(--bg);color:var(--text);min-height:100vh;overflow:hidden}
.guide-shell{display:grid;grid-template-rows:auto auto 1fr;height:100vh}
.guide-header{display:flex;align-items:center;gap:.65rem;padding:.55rem 1rem;background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);flex-wrap:wrap;z-index:20}
.guide-brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:.88rem;color:var(--accent-strong)}
.guide-brand-mark{width:34px;height:34px;border-radius:10px;background:var(--gradient);color:#fff;display:grid;place-items:center;font-size:.68rem}
.chip{display:inline-flex;align-items:center;padding:.28rem .6rem;border-radius:999px;border:1px solid var(--border);background:var(--surface);font-size:.72rem;font-weight:600}
.chip.route{font-family:Consolas,monospace;color:var(--accent-strong);background:#eff6ff;border-color:#93c5fd}
.chip.gold{background:linear-gradient(135deg,#d4af37,#c9a020);color:#061e47;border:none}
.guide-nav{display:flex;gap:.35rem;margin-left:auto}
.gbtn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:.42rem .85rem;font-size:.78rem;font-weight:650;cursor:pointer;transition:transform .15s,box-shadow .15s}
.gbtn.primary{background:var(--gradient);border-color:var(--accent);color:#fff}
.gbtn:hover{transform:translateY(-1px)}
.gbtn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.step-rail{display:flex;gap:.25rem;padding:.4rem 1rem;overflow-x:auto;border-bottom:1px solid var(--border);background:rgba(255,255,255,.88);scrollbar-width:thin}
.step-dot{min-width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-size:.62rem;font-weight:800;cursor:pointer;flex-shrink:0;display:grid;place-items:center;transition:all .2s}
.step-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.08)}
.step-dot.done{background:var(--success);border-color:var(--success);color:#fff}
.guide-body{display:grid;grid-template-columns:1fr var(--coach-w);min-height:0}
.mock-frame{position:relative;overflow:auto;background:var(--bg);border-right:1px solid var(--border)}
.mock-inner{min-height:100%;animation:screenIn .45s ease}
@keyframes screenIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.route-badge{position:absolute;top:.55rem;left:.65rem;z-index:9;pointer-events:none;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:rgba(6,30,71,.88);color:#fff;padding:.25rem .55rem;border-radius:999px}
.demo-tag{position:absolute;top:.55rem;right:.65rem;z-index:9;pointer-events:none;background:rgba(212,175,55,.92);color:#061e47;padding:.22rem .55rem;border-radius:999px;font-size:.58rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.hotspot-ring{position:relative;z-index:2}
.hotspot-ring::before{content:"";position:absolute;inset:-4px;border:3px solid var(--guide-accent);border-radius:10px;animation:ringPulse 1.8s ease infinite;pointer-events:none}
@keyframes ringPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.02)}}
.coach{background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);display:flex;flex-direction:column;min-height:0;box-shadow:-8px 0 32px rgba(15,23,42,.06)}
.coach-head{padding:1rem 1rem .75rem;border-bottom:1px solid var(--border)}
.coach-phase{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.coach-head h2{font-size:1.05rem;color:var(--accent-strong);line-height:1.35;margin:.35rem 0}
.coach-scroll{flex:1;overflow-y:auto;padding:1rem;display:grid;gap:.85rem}
.script-card{background:linear-gradient(135deg,#f8faff,#eef3ff);border:1px solid #c7d7f5;border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:1rem;line-height:1.65;font-size:.88rem}
.role-card{background:var(--surface-muted);border:1px solid var(--border);border-radius:12px;padding:.85rem;font-size:.82rem;line-height:1.55}
.role-card h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--accent-strong);margin-bottom:.35rem}
.action-step{display:flex;gap:.55rem;padding:.55rem .65rem;border-radius:10px;border:1px solid var(--border);font-size:.82rem;background:var(--surface);align-items:flex-start}
.action-step.active{background:#eff6ff;border-color:#93c5fd;box-shadow:inset 3px 0 0 var(--accent)}
.action-num{width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:800;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.flow-arrow{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;font-size:.72rem;margin:.5rem 0}
.flow-arrow span{padding:.3rem .55rem;border-radius:8px;border:1px solid var(--border);background:var(--surface)}
.flow-arrow .arr{color:var(--muted);font-weight:700}
.warn-box{background:#fff7ed;border:1px solid #fdba74;border-radius:10px;padding:.65rem .75rem;font-size:.78rem;color:#9a3412;line-height:1.5}
.coach-foot{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.45rem;align-items:center}
.progress-text{font-size:.72rem;color:var(--muted);margin-right:auto}

/* ——— Réplica UI Compliance 360 (styles.css) ——— */
.login-page{min-height:calc(100vh - 80px);display:grid;grid-template-columns:minmax(300px,420px) 1fr}
.login-panel{background:rgba(255,255,255,.92);padding:42px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--border);box-shadow:var(--shadow)}
.login-hero{padding:48px;display:flex;flex-direction:column;justify-content:center;gap:22px;background:linear-gradient(135deg,rgba(15,76,129,.92),rgba(15,118,110,.78)),linear-gradient(45deg,rgba(255,255,255,.08) 25%,transparent 25%,transparent 50%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.08) 75%,transparent 75%);background-size:auto,42px 42px}
.brand-line{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.brand-mark{width:44px;height:44px;border-radius:12px;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:800;font-size:.82rem}
.product-badge{display:inline-flex;border:1px solid rgba(23,105,170,.24);border-radius:999px;padding:5px 10px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-strong);background:rgba(23,105,170,.1)}
.language-switch{margin-left:auto;font-size:12px;color:var(--muted)}
.language-switch select{border:1px solid var(--border);border-radius:999px;padding:6px 10px;background:var(--surface)}
.login-panel h1{font-size:26px;margin:0 0 8px;letter-spacing:-.02em}
.login-panel>p{color:var(--muted);line-height:1.5;font-size:14px;margin-bottom:8px}
.form-stack{display:grid;gap:14px;margin-top:14px}
.field{display:grid;gap:6px}
.field label{font-weight:650;font-size:13px}
.field input,.field select,.field textarea,.search-box{border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:10px 12px;width:100%;font-size:14px;color:var(--text)}
.field small{color:var(--muted);font-size:11px}
.org-list{display:grid;gap:10px}
.org-option{display:grid;grid-template-columns:auto 34px 1fr;align-items:center;gap:10px;border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:var(--surface)}
.org-option.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.18)}
.org-logo{width:34px;height:34px;border-radius:10px;background:var(--gradient);color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
.org-option strong{display:block;font-size:14px}
.org-option small{color:var(--muted);font-size:12px}
.org-selected-chip{padding:8px 12px;border-radius:10px;background:var(--surface-muted);border:1px solid var(--border);margin-bottom:8px;font-size:13px}
.remember-line{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.button-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:10px 14px;font-weight:600;font-size:13px;min-height:40px;display:inline-flex;align-items:center;justify-content:center}
.btn.primary{background:var(--gradient);border-color:var(--accent);color:#fff}
.btn.subtle{background:var(--surface-muted)}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.small{padding:6px 10px;font-size:12px;min-height:32px}
.hero-card h2{color:#fff;font-size:1.55rem;margin:.5rem 0}
.hero-card p{color:rgba(255,255,255,.88);line-height:1.55;font-size:14px}
.hero-card .product-badge{border-color:rgba(255,255,255,.3);color:#fff;background:rgba(255,255,255,.12)}
.hero-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.status-pill{display:inline-flex;border:1px solid var(--border);border-radius:999px;padding:5px 10px;font-size:12px;background:var(--surface)}
.status-pill.ok{color:var(--success);border-color:rgba(15,118,110,.25);background:rgba(15,118,110,.1)}
.status-pill.warn{color:var(--warning);border-color:rgba(180,83,9,.25);background:rgba(180,83,9,.1)}
.grid.cards{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:12px}
.glass-card{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px;color:#fff}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;opacity:.85}
.metric-value{font-size:1.35rem;font-weight:800;margin-top:4px}
.layout{min-height:calc(100vh - 80px);display:grid;grid-template-columns:258px 1fr}
.sidebar{background:rgba(255,255,255,.92);border-right:1px solid var(--border);padding:14px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px;border-bottom:1px solid var(--border)}
.brand-title{font-weight:800;font-size:14px}
.brand-subtitle{color:var(--muted);font-size:11px}
.sidebar-status{display:grid;gap:6px;margin:12px 0;padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--surface)}
.sidebar-status small{color:var(--muted);font-size:11px}
.nav-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;padding:8px 6px 4px}
.nav-button{width:100%;border:0;background:transparent;text-align:left;padding:8px 10px;border-radius:10px;display:grid;grid-template-columns:30px 1fr auto;gap:8px;align-items:center;font-size:13px;color:var(--text)}
.nav-button.active{background:var(--surface-muted);box-shadow:inset 4px 0 0 var(--accent);font-weight:700;color:var(--accent-strong)}
.nav-icon{width:26px;height:26px;border-radius:9px;background:rgba(23,105,170,.1);color:var(--accent-strong);display:grid;place-items:center;font-size:10px;font-weight:800}
.sidebar-footer{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{min-height:60px;display:grid;grid-template-columns:1fr 1.1fr auto;gap:12px;align-items:center;padding:0 18px;background:rgba(255,255,255,.84);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
.breadcrumbs.compact{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tenant-chip{font-size:12px;border:1px solid var(--border);border-radius:999px;padding:5px 9px;color:var(--muted);background:var(--surface)}
.content{padding:20px;display:grid;gap:18px;max-width:1680px}
.page-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
.page-title h1{font-size:1.35rem;margin:0;letter-spacing:-.03em}
.page-title p{color:var(--muted);font-size:13px;margin-top:4px}
.breadcrumbs{color:var(--muted);font-size:13px}
.tenant-hero,.platform-hero{display:flex;justify-content:space-between;gap:16px;padding:18px;border-radius:var(--radius);background:linear-gradient(135deg,rgba(23,105,170,.08),rgba(15,118,110,.06));border:1px solid var(--border);align-items:flex-start;flex-wrap:wrap}
.tenant-health{display:grid;gap:6px;text-align:right}
.platform-command{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.platform-command input{flex:1;min-width:200px;border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.section-heading{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}
.section-title{font-size:1.05rem;margin:0}
.grid.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;position:relative;overflow:hidden}
.metric-card span{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.metric-card strong{font-size:1.15rem}
.tenant-admin-shell{display:grid;grid-template-columns:260px minmax(0,1fr);gap:18px;align-items:start}
.tenant-tabs{display:grid;gap:8px;padding:12px;border:1px solid var(--border);border-radius:calc(var(--radius) + 6px);background:rgba(255,255,255,.78);box-shadow:var(--shadow)}
.tenant-tab{width:100%;display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center;border:1px solid transparent;border-radius:12px;padding:10px;text-align:left;font-size:13px;background:transparent;color:var(--text)}
.tenant-tab span{width:28px;height:28px;display:grid;place-items:center;border-radius:999px;background:var(--surface-muted);color:var(--accent);font-weight:700;font-size:12px}
.tenant-tab.active{border-color:rgba(23,105,170,.28);background:linear-gradient(135deg,rgba(23,105,170,.13),rgba(15,118,110,.08));font-weight:700}
.tenant-panel{padding:20px;border:1px solid var(--border);border-radius:calc(var(--radius) + 6px);background:var(--surface);box-shadow:var(--shadow)}
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:12px}
.data-table th{background:var(--surface-muted);text-align:left;padding:8px;border:1px solid var(--border);font-size:10px;text-transform:uppercase;color:var(--muted)}
.data-table td{padding:8px;border:1px solid var(--border)}
.tag{display:inline-block;padding:4px 8px;border-radius:8px;background:var(--surface-muted);font-size:11px;color:var(--muted)}
.tenant-state-flow{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;font-size:12px}
.tenant-state-flow span{padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface-muted)}
.toast-mock{position:absolute;bottom:1rem;right:1rem;background:#ecfdf5;border:1px solid #86efac;color:var(--success);padding:.65rem 1rem;border-radius:12px;font-size:.82rem;font-weight:600;animation:toastIn .5s ease;box-shadow:var(--shadow);z-index:10}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.intro-full{min-height:calc(100vh - 80px);display:grid;place-items:center;padding:2rem}
.intro-card{max-width:760px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;box-shadow:var(--shadow)}
.intro-card h1{font-size:1.75rem;color:var(--accent-strong);margin-bottom:.75rem}
.intro-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem}
@media(max-width:1100px){.guide-body{grid-template-columns:1fr}.coach{position:fixed;right:0;bottom:0;left:0;height:44vh;z-index:30;border-top:1px solid var(--border)}.mock-frame{padding-bottom:44vh}.login-page,.layout{grid-template-columns:1fr}.login-hero{display:none}.grid.cards,.grid.two,.intro-grid{grid-template-columns:1fr}.tenant-admin-shell{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="guide-shell">
  <header class="guide-header">
    <div class="guide-brand"><div class="guide-brand-mark">C360</div>Guía Administrador</div>
    <span class="chip gold">HTML autocontenido · abrir con doble clic</span>
    <span class="chip route" id="routeChip">#/intro</span>
    <nav class="guide-nav">
      <button type="button" class="gbtn" id="btnPrev">← Anterior</button>
      <button type="button" class="gbtn primary" id="btnNext">Siguiente →</button>
    </nav>
  </header>
  <div class="step-rail" id="stepRail" aria-label="Pasos del flujo"></div>
  <div class="guide-body">
    <div class="mock-frame" id="mockFrame">
      <span class="route-badge" id="routeBadge">Pantalla ilustrada</span>
      <span class="demo-tag">Réplica visual · no conectada a API</span>
      <div class="mock-inner" id="mockApp"></div>
    </div>
    <aside class="coach">
      <div class="coach-head">
        <div class="coach-phase" id="coachPhase">Fase 0</div>
        <h2 id="coachTitle">Cargando…</h2>
      </div>
      <div class="coach-scroll" id="coachBody"></div>
      <footer class="coach-foot">
        <span class="progress-text" id="progressText">Paso 1 de 18</span>
        <button type="button" class="gbtn" id="btnAuto">▶ Auto</button>
      </footer>
    </aside>
  </div>
</div>
<script>
(function(){
  const DEMO = {
    platformEmail: "admin@compliance360.local",
    platformOrg: "Compliance 360 Platform",
    platformOrgDesc: "Tenant plataforma · gobierno global",
    tenantExample: {
      name: "Alimentos Premium Panama",
      slug: "alimentos-premium-pa",
      legalName: "Alimentos Premium Panama, S.A.",
      commercialName: "Alimentos Premium",
      taxId: "RUC-155999999-2-2026",
      country: "PA",
      currency: "USD",
      industry: "Manufactura de alimentos",
      phone: "+507 6000-0000",
      email: "contacto@alimentos-premium.test",
      website: "https://alimentos-premium.test"
    },
    appUrl: "http://localhost:5272"
  };

  const STEPS = [
    {
      id:"intro", phase:"Introducción", route:"#/guia-admin",
      title:"Rol del Administrador en Compliance 360",
      coach:`
        <div class="script-card">Esta guía explica <strong>cómo iniciar sesión</strong>, qué verás como administrador y el <strong>flujo completo para crear y configurar un tenant</strong>. Las pantallas replican la UI real de <code>app.js</code> y <code>styles.css</code>.</div>
        <div class="role-card"><h4>Platform Administrator</h4>Gobierna toda la plataforma. Accede a <strong>SuperAdmin Platform Center</strong> (<code>#/superadmin-platform</code>). Crea tenants, observa métricas globales, licencias y auditoría.</div>
        <div class="role-card"><h4>Tenant Administrator</h4>Administra un tenant concreto en el <strong>Tenant Administration Center</strong> (<code>#/tenant-administration</code>): datos empresa, branding, seguridad, usuarios, RBAC y activación.</div>
        <div class="warn-box">Las contraseñas <strong>no</strong> están en este HTML. Tras ejecutar <code>e2e_provision.ps1</code>, use las credenciales de su entorno (p. ej. <code>e2e/testdata.json</code>).</div>
      `,
      render: ()=>`
        <div class="intro-full">
          <article class="intro-card">
            <span class="product-badge">Manual visual · Administrador</span>
            <h1>Compliance 360 — Login, Tenant y Configuración</h1>
            <p style="color:var(--muted);line-height:1.6;margin-top:.5rem">Recorrido paso a paso con pantallas idénticas a la aplicación. Sin servidor local: abra este archivo con doble clic.</p>
            <div class="intro-grid">
              <div class="card"><strong>18 pasos</strong><p style="font-size:.85rem;color:var(--muted);margin-top:.35rem">Login v2 → SuperAdmin → Crear tenant → TAC → Activar</p></div>
              <div class="card"><strong>2 roles admin</strong><p style="font-size:.85rem;color:var(--muted);margin-top:.35rem">Platform Administrator y Tenant Administrator</p></div>
              <div class="card"><strong>Rutas reales</strong><p style="font-size:.85rem;color:var(--muted);margin-top:.35rem"><code>#/superadmin-platform</code><br><code>#/tenant-administration</code></p></div>
              <div class="card"><strong>Animaciones</strong><p style="font-size:.85rem;color:var(--muted);margin-top:.35rem">Hotspots, transiciones y flujo guiado</p></div>
            </div>
            <p style="margin-top:1.25rem;font-size:.85rem;color:var(--muted)">Pulse <strong>Siguiente →</strong> o use las teclas ← →</p>
          </article>
        </div>`
    },
    {
      id:"login-email", phase:"Login v2 · Paso 1", route:"#/login",
      title:"Correo corporativo — botón Siguiente",

  function renderStep(i){
    idx = Math.max(0, Math.min(STEPS.length-1, i));
    const s = STEPS[idx];
    document.getElementById("mockApp").innerHTML = s.render();
    document.getElementById("coachPhase").textContent = s.phase;
    document.getElementById("coachTitle").textContent = s.title;
    document.getElementById("coachBody").innerHTML = s.coach;
    document.getElementById("routeChip").textContent = s.route;
    document.getElementById("routeBadge").textContent = s.route;
    document.getElementById("progressText").textContent = `Paso ${idx+1} de ${STEPS.length}`;
    document.getElementById("btnPrev").disabled = idx===0;
    document.getElementById("btnNext").textContent = idx===STEPS.length-1 ? "Fin ✓" : "Siguiente →";
    document.getElementById("stepRail").innerHTML = STEPS.map((st,n)=>`<button type="button" class="step-dot ${n===idx?"active":""} ${n<idx?"done":""}" data-i="${n}" title="${st.title}">${n+1}</button>`).join("");
    document.querySelectorAll(".step-dot").forEach(d=> d.onclick=()=>{ stopAuto(); renderStep(+d.dataset.i); });
    document.getElementById("mockFrame").scrollTop = 0;
  }

  function stopAuto(){ if(autoTimer){ clearInterval(autoTimer); autoTimer=null; document.getElementById("btnAuto").textContent="▶ Auto"; } }
  function toggleAuto(){
    if(autoTimer){ stopAuto(); return; }
    document.getElementById("btnAuto").textContent="⏸ Pausar";
    autoTimer = setInterval(()=>{ if(idx>=STEPS.length-1){ stopAuto(); return; } renderStep(idx+1); }, 4500);
  }

  document.getElementById("btnPrev").onclick=()=>{ stopAuto(); renderStep(idx-1); };
  document.getElementById("btnNext").onclick=()=>{ stopAuto(); if(idx<STEPS.length-1) renderStep(idx+1); };
  document.getElementById("btnAuto").onclick=toggleAuto;
  document.addEventListener("keydown", e=>{
    if(e.key==="ArrowLeft"){ stopAuto(); renderStep(idx-1); }
    if(e.key==="ArrowRight"){ stopAuto(); if(idx<STEPS.length-1) renderStep(idx+1); }
  });

  renderStep(0);
})();
